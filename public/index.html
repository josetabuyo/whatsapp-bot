<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin — WhatsApp Bot</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f0f2f5; color: #111; min-height: 100vh; }

    /* Login */
    #login-screen { display: flex; align-items: center; justify-content: center; min-height: 100vh; }
    .login-box { background: white; border-radius: 16px; padding: 40px 36px; width: 340px; box-shadow: 0 2px 12px rgba(0,0,0,.1); text-align: center; }
    .login-box h1 { font-size: 22px; margin-bottom: 6px; }
    .login-box p { color: #888; font-size: 14px; margin-bottom: 24px; }
    .login-error { color: #c00; font-size: 13px; min-height: 18px; margin-bottom: 10px; }

    /* App */
    #app { display: none; }
    header { background: #25d366; color: white; padding: 14px 24px; display: flex; align-items: center; justify-content: space-between; }
    header span { font-size: 18px; font-weight: 600; }
    .header-actions { display: flex; gap: 10px; align-items: center; }

    main { max-width: 900px; margin: 28px auto; padding: 0 16px; }

    /* Cards */
    .card { background: white; border-radius: 12px; padding: 20px 24px; margin-bottom: 20px; box-shadow: 0 1px 4px rgba(0,0,0,.07); }
    .card-title { font-size: 13px; font-weight: 600; color: #888; text-transform: uppercase; letter-spacing: .5px; margin-bottom: 16px; }

    /* Share link */
    .share-row { display: flex; gap: 10px; align-items: center; }
    .share-url { flex: 1; padding: 9px 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 14px; color: #444; background: #fafafa; cursor: text; }

    /* Bot section */
    .bot-block { border: 1px solid #e8e8e8; border-radius: 10px; margin-bottom: 16px; overflow: hidden; }
    .bot-header { display: flex; align-items: flex-start; justify-content: space-between; padding: 14px 16px; background: #f8f8f8; border-bottom: 1px solid #e8e8e8; gap: 12px; }
    .bot-header-info { flex: 1; min-width: 0; }
    .bot-name { font-size: 15px; font-weight: 600; }
    .bot-id { font-size: 12px; color: #aaa; margin-top: 1px; }
    .bot-msg { font-size: 13px; color: #666; margin-top: 6px; background: #f0f0f0; border-radius: 6px; padding: 6px 10px; white-space: pre-wrap; word-break: break-word; }
    .bot-header-actions { display: flex; gap: 6px; flex-shrink: 0; }

    /* Phone rows */
    .phones-table { width: 100%; }
    .phone-row { display: flex; align-items: center; padding: 10px 16px; border-bottom: 1px solid #f0f0f0; gap: 12px; }
    .phone-row:last-child { border-bottom: none; }
    .phone-number { font-size: 14px; font-weight: 500; min-width: 140px; }
    .phone-contacts { font-size: 13px; color: #777; flex: 1; }
    .phone-msg-override { font-size: 12px; color: #999; font-style: italic; }
    .phone-actions { display: flex; gap: 6px; align-items: center; flex-shrink: 0; }

    .add-phone-row { padding: 10px 16px; }

    /* Status badge */
    .badge { display: inline-flex; align-items: center; gap: 5px; padding: 3px 9px; border-radius: 20px; font-size: 12px; font-weight: 500; white-space: nowrap; }
    .dot { width: 7px; height: 7px; border-radius: 50%; }
    .s-ready     { background: #e8f8f0; color: #1a7a45; } .s-ready .dot     { background: #25d366; }
    .s-qr_ready  { background: #fff8e1; color: #856404; } .s-qr_ready .dot  { background: #ffc107; animation: blink 1.2s infinite; }
    .s-connecting, .s-authenticated { background: #e8f0fe; color: #1a4dab; }
    .s-connecting .dot, .s-authenticated .dot { background: #4285f4; animation: blink 1.2s infinite; }
    .s-disconnected, .s-failed, .s-stopped { background: #fce8e6; color: #a33; }
    .s-disconnected .dot, .s-failed .dot, .s-stopped .dot { background: #d93025; }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.25} }

    /* Buttons */
    button { border: none; border-radius: 7px; padding: 7px 13px; font-size: 13px; font-weight: 500; cursor: pointer; transition: opacity .15s; font-family: inherit; }
    button:hover { opacity: .82; }
    button:disabled { opacity: .4; cursor: not-allowed; }
    .btn-primary { background: #25d366; color: white; }
    .btn-danger  { background: #fee; color: #c00; }
    .btn-ghost   { background: #f0f0f0; color: #444; }
    .btn-blue    { background: #e8f0fe; color: #1a4dab; }
    .btn-sm      { padding: 5px 10px; font-size: 12px; }

    /* Forms */
    .fg { display: flex; flex-direction: column; gap: 4px; margin-bottom: 12px; }
    label { font-size: 13px; color: #555; font-weight: 500; }
    input, textarea, select { border: 1px solid #ddd; border-radius: 8px; padding: 9px 12px; font-size: 14px; outline: none; font-family: inherit; transition: border-color .15s; width: 100%; }
    input:focus, textarea:focus { border-color: #25d366; }
    textarea { resize: vertical; min-height: 70px; }
    .form-grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .full { grid-column: 1/-1; }

    /* Modal */
    .overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.45); z-index: 100; align-items: center; justify-content: center; }
    .overlay.open { display: flex; }
    .modal { background: white; border-radius: 14px; padding: 28px; width: 460px; max-width: 95vw; position: relative; }
    .modal h3 { font-size: 17px; font-weight: 600; margin-bottom: 20px; }
    .modal-close { position: absolute; top: 12px; right: 14px; background: none; color: #aaa; font-size: 20px; padding: 4px 8px; }
    .modal-actions { display: flex; justify-content: flex-end; gap: 8px; margin-top: 4px; }

    .empty { text-align: center; color: #bbb; padding: 20px; font-size: 14px; }
    .section-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
    .section-header h2 { font-size: 13px; font-weight: 600; color: #888; text-transform: uppercase; letter-spacing: .5px; }

    /* QR modal */
    .qr-wrap { width: 240px; height: 240px; margin: 16px auto; border: 2px dashed #ddd; border-radius: 12px; display: flex; align-items: center; justify-content: center; overflow: hidden; }
    .qr-wrap img { width: 100%; height: 100%; object-fit: contain; }
    .qr-hint { font-size: 13px; color: #888; text-align: center; margin-bottom: 4px; line-height: 1.5; }
    .qr-status { font-size: 13px; color: #555; text-align: center; margin-top: 8px; min-height: 18px; }
    .spinner { width: 32px; height: 32px; border: 3px solid #e0e0e0; border-top-color: #25d366; border-radius: 50%; animation: spin .7s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .success-icon { font-size: 48px; text-align: center; margin: 16px 0; }
    .success-text { font-size: 16px; font-weight: 600; color: #1a7a45; text-align: center; }
  </style>
</head>
<body>

<!-- Login -->
<div id="login-screen">
  <div class="login-box">
    <h1>🔐 Admin</h1>
    <p>Ingresá la contraseña de administrador</p>
    <div class="login-error" id="login-error"></div>
    <input type="password" id="pwd-input" placeholder="Contraseña" style="width:100%;margin-bottom:12px" autofocus />
    <button class="btn-primary" style="width:100%;padding:11px" onclick="doLogin()">Entrar</button>
  </div>
</div>

<!-- App -->
<div id="app">
  <header>
    <span>📱 WhatsApp Bot — Admin</span>
    <div class="header-actions">
      <button class="btn-ghost btn-sm" onclick="logout()">Salir</button>
    </div>
  </header>
  <main>

    <!-- Link para clientes -->
    <div class="card">
      <div class="card-title">Link para conectar clientes</div>
      <div class="share-row">
        <input class="share-url" id="connect-url" readonly />
        <button class="btn-blue" onclick="copyLink()">Copiar</button>
        <button class="btn-ghost" onclick="window.open(document.getElementById('connect-url').value)">Abrir</button>
      </div>
    </div>

    <!-- Bots y teléfonos -->
    <div class="card">
      <div class="section-header">
        <h2>Empresas y teléfonos</h2>
        <button class="btn-primary btn-sm" onclick="openCreateBot()">+ Nueva empresa</button>
      </div>
      <div id="bots-list"><div class="empty">Cargando...</div></div>
    </div>

  </main>
</div>

<!-- Modal: QR conexión -->
<div class="overlay" id="modal-qr">
  <div class="modal" style="width:360px;text-align:center">
    <button class="modal-close" onclick="closeQRModal()">✕</button>
    <h3 id="qr-modal-title">Vincular teléfono</h3>
    <p class="qr-hint">Abrí WhatsApp → <strong>Dispositivos vinculados</strong> → <strong>Vincular dispositivo</strong></p>
    <div class="qr-wrap" id="qr-wrap"><div class="spinner"></div></div>
    <div class="qr-status" id="qr-status">Iniciando conexión...</div>
  </div>
</div>

<!-- Modal: crear/editar bot -->
<div class="overlay" id="modal-bot">
  <div class="modal">
    <button class="modal-close" onclick="closeModal('modal-bot')">✕</button>
    <h3 id="modal-bot-title">Nueva empresa</h3>
    <input type="hidden" id="bot-edit-id" />
    <div class="fg">
      <label>ID (sin espacios, ej: bot_guardia)</label>
      <input id="bot-id" type="text" placeholder="bot_guardia" />
    </div>
    <div class="fg">
      <label>Nombre de la empresa</label>
      <input id="bot-name" type="text" placeholder="Herrería García" />
    </div>
    <div class="fg">
      <label>Mensaje de respuesta automática</label>
      <textarea id="bot-message" placeholder="Hola! Estamos fuera de horario, te respondemos a la brevedad."></textarea>
    </div>
    <div class="modal-actions">
      <button class="btn-ghost" onclick="closeModal('modal-bot')">Cancelar</button>
      <button class="btn-primary" onclick="saveBot()">Guardar</button>
    </div>
  </div>
</div>

<!-- Modal: crear/editar teléfono -->
<div class="overlay" id="modal-phone">
  <div class="modal">
    <button class="modal-close" onclick="closeModal('modal-phone')">✕</button>
    <h3 id="modal-phone-title">Agregar teléfono</h3>
    <input type="hidden" id="phone-edit-number" />
    <input type="hidden" id="phone-edit-botId" />
    <div class="fg" id="phone-number-group">
      <label>Número (sin +)</label>
      <input id="phone-number" type="tel" placeholder="5491155612767" />
    </div>
    <div class="fg">
      <label>Contactos permitidos (separados por coma)</label>
      <input id="phone-contacts" type="text" placeholder="Juan García, María López" />
    </div>
    <div class="fg">
      <label>Mensaje personalizado (opcional, pisa el de la empresa)</label>
      <textarea id="phone-message" placeholder="Dejar vacío para usar el mensaje de la empresa"></textarea>
    </div>
    <div class="modal-actions">
      <button class="btn-ghost" onclick="closeModal('modal-phone')">Cancelar</button>
      <button class="btn-primary" onclick="savePhone()">Guardar</button>
    </div>
  </div>
</div>

<script src="/qr.js"></script>
<script>
  let pwd = sessionStorage.getItem('admin_pwd') || '';

  const STATUS_LABELS = {
    ready: 'Conectado', qr_ready: 'Esperando escaneo',
    connecting: 'Conectando', authenticated: 'Autenticando',
    disconnected: 'Desconectado', failed: 'Error', stopped: 'Sin iniciar',
  };

  function api(method, path, body) {
    return fetch('/api' + path, {
      method,
      headers: { 'Content-Type': 'application/json', 'X-Password': pwd },
      body: body ? JSON.stringify(body) : undefined,
    }).then(r => r.json());
  }

  async function doLogin() {
    const input = document.getElementById('pwd-input').value;
    const res = await fetch('/api/auth', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ password: input }),
    }).then(r => r.json());
    if (!res.ok || res.role !== 'admin') {
      document.getElementById('login-error').textContent = 'Contraseña incorrecta';
      return;
    }
    pwd = input;
    sessionStorage.setItem('admin_pwd', pwd);
    showApp();
  }

  function showApp() {
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    document.getElementById('connect-url').value = location.origin + '/connect';
    loadBots();
  }

  function logout() {
    sessionStorage.removeItem('admin_pwd');
    location.reload();
  }

  function copyLink() {
    navigator.clipboard.writeText(document.getElementById('connect-url').value);
    const btn = event.target;
    btn.textContent = '¡Copiado!';
    setTimeout(() => btn.textContent = 'Copiar', 2000);
  }

  // --- Render ---
  async function loadBots() {
    const bots = await api('GET', '/bots');
    if (!Array.isArray(bots)) return;
    const el = document.getElementById('bots-list');
    if (bots.length === 0) {
      el.innerHTML = '<div class="empty">No hay empresas configuradas. Creá una con el botón de arriba.</div>';
      return;
    }
    el.innerHTML = bots.map(bot => renderBot(bot)).join('');
  }

  function renderBot(bot) {
    const phonesHtml = bot.phones.length === 0
      ? '<div class="empty" style="padding:12px">Sin teléfonos</div>'
      : bot.phones.map(p => renderPhone(p, bot.id)).join('');

    return `
      <div class="bot-block" id="bot-${bot.id}">
        <div class="bot-header">
          <div class="bot-header-info">
            <div class="bot-name">${esc(bot.name)}</div>
            <div class="bot-id">${esc(bot.id)}</div>
            <div class="bot-msg">${esc(bot.autoReplyMessage)}</div>
          </div>
          <div class="bot-header-actions">
            <button class="btn-ghost btn-sm" onclick="openEditBot('${esc(bot.id)}', '${esc(bot.name)}', ${JSON.stringify(bot.autoReplyMessage)})">Editar</button>
            <button class="btn-danger btn-sm" onclick="deleteBot('${esc(bot.id)}')">Eliminar</button>
          </div>
        </div>
        <div class="phones-table">${phonesHtml}</div>
        <div class="add-phone-row">
          <button class="btn-blue btn-sm" onclick="openAddPhone('${esc(bot.id)}')">+ Agregar teléfono</button>
        </div>
      </div>
    `;
  }

  function renderPhone(p, botId) {
    const contactsText = p.allowedContacts.length ? p.allowedContacts.join(', ') : '(sin contactos permitidos)';
    const overrideText = p.autoReplyMessage ? `Mensaje propio: "${p.autoReplyMessage}"` : '';
    return `
      <div class="phone-row">
        <div class="phone-number">+${esc(p.number)}</div>
        <div style="flex:1;min-width:0">
          <div class="phone-contacts">${esc(contactsText)}</div>
          ${overrideText ? `<div class="phone-msg-override">${esc(overrideText)}</div>` : ''}
        </div>
        <div class="phone-actions">
          <span class="badge s-${p.status}"><span class="dot"></span>${STATUS_LABELS[p.status] || p.status}</span>
          ${p.status !== 'ready' ? `<button class="btn-blue btn-sm" onclick="connectPhone('${p.number}', '${p.sessionId}')">Conectar</button>` : ''}
          <button class="btn-ghost btn-sm" onclick="openEditPhone('${esc(p.number)}', '${esc(botId)}', ${JSON.stringify(p.allowedContacts)}, ${JSON.stringify(p.autoReplyMessage || '')})">Editar</button>
          <button class="btn-danger btn-sm" onclick="deletePhone('${esc(p.number)}')">Eliminar</button>
        </div>
      </div>
    `;
  }

  function esc(str) {
    return String(str ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
  }

  // --- Bot CRUD ---
  function openCreateBot() {
    document.getElementById('modal-bot-title').textContent = 'Nueva empresa';
    document.getElementById('bot-edit-id').value = '';
    document.getElementById('bot-id').value = '';
    document.getElementById('bot-id').disabled = false;
    document.getElementById('bot-name').value = '';
    document.getElementById('bot-message').value = '';
    openModal('modal-bot');
  }

  function openEditBot(id, name, message) {
    document.getElementById('modal-bot-title').textContent = 'Editar empresa';
    document.getElementById('bot-edit-id').value = id;
    document.getElementById('bot-id').value = id;
    document.getElementById('bot-id').disabled = true;
    document.getElementById('bot-name').value = name;
    document.getElementById('bot-message').value = message;
    openModal('modal-bot');
  }

  async function saveBot() {
    const editId = document.getElementById('bot-edit-id').value;
    const id = document.getElementById('bot-id').value.trim();
    const name = document.getElementById('bot-name').value.trim();
    const message = document.getElementById('bot-message').value.trim();
    if (!name || !message) return alert('Nombre y mensaje son requeridos.');

    let res;
    if (editId) {
      res = await api('PUT', `/bots/${editId}`, { name, autoReplyMessage: message });
    } else {
      if (!id) return alert('ID es requerido.');
      // Crear bot requiere al menos un teléfono — lo hacemos vía el endpoint de phones
      // Guardamos el bot id/name/message para usarlo al agregar el primer teléfono
      closeModal('modal-bot');
      openAddPhone(id, { name, autoReplyMessage: message });
      return;
    }

    if (res.error) return alert('Error: ' + res.error);
    closeModal('modal-bot');
    loadBots();
  }

  async function deleteBot(botId) {
    if (!confirm(`¿Eliminar la empresa "${botId}" y todos sus teléfonos?`)) return;
    const res = await api('DELETE', `/bots/${botId}`);
    if (res.error) return alert('Error: ' + res.error);
    loadBots();
  }

  // --- Phone CRUD ---
  let _pendingNewBot = null;

  function openAddPhone(botId, newBotData = null) {
    _pendingNewBot = newBotData;
    document.getElementById('modal-phone-title').textContent = 'Agregar teléfono';
    document.getElementById('phone-edit-number').value = '';
    document.getElementById('phone-edit-botId').value = botId;
    document.getElementById('phone-number').value = '';
    document.getElementById('phone-number').disabled = false;
    document.getElementById('phone-number-group').style.display = '';
    document.getElementById('phone-contacts').value = '';
    document.getElementById('phone-message').value = '';
    openModal('modal-phone');
  }

  function openEditPhone(number, botId, allowedContacts, message) {
    _pendingNewBot = null;
    document.getElementById('modal-phone-title').textContent = 'Editar teléfono';
    document.getElementById('phone-edit-number').value = number;
    document.getElementById('phone-edit-botId').value = botId;
    document.getElementById('phone-number-group').style.display = 'none';
    document.getElementById('phone-contacts').value = allowedContacts.join(', ');
    document.getElementById('phone-message').value = message || '';
    openModal('modal-phone');
  }

  async function savePhone() {
    const editNumber = document.getElementById('phone-edit-number').value;
    const botId     = document.getElementById('phone-edit-botId').value;
    const number    = document.getElementById('phone-number').value.trim();
    const contacts  = document.getElementById('phone-contacts').value.trim();
    const message   = document.getElementById('phone-message').value.trim();

    const allowedContacts = contacts ? contacts.split(',').map(c => c.trim()).filter(Boolean) : [];

    let res;
    if (editNumber) {
      res = await api('PUT', `/phones/${editNumber}`, { allowedContacts, autoReplyMessage: message });
    } else {
      if (!number) return alert('Número requerido.');
      const body = { botId, number, allowedContacts };
      if (message) body.autoReplyMessage = message;
      if (_pendingNewBot) {
        body.botName = _pendingNewBot.name;
        body.autoReplyMessage = body.autoReplyMessage || _pendingNewBot.autoReplyMessage;
        if (!body.autoReplyMessage) body.autoReplyMessage = _pendingNewBot.autoReplyMessage;
      }
      res = await api('POST', '/phones', body);
    }

    if (res.error) return alert('Error: ' + res.error);
    _pendingNewBot = null;
    closeModal('modal-phone');
    loadBots();
  }

  async function deletePhone(number) {
    if (!confirm(`¿Eliminar el teléfono +${number}?`)) return;
    const res = await api('DELETE', `/phones/${number}`);
    if (res.error) return alert('Error: ' + res.error);
    loadBots();
  }

  // --- QR modal ---
  let _stopPolling = null;

  async function connectPhone(number) {
    document.getElementById('qr-modal-title').textContent = `Vincular +${number}`;
    document.getElementById('qr-wrap').innerHTML = '<div class="spinner"></div>';
    document.getElementById('qr-status').textContent = 'Iniciando conexión...';
    openModal('modal-qr');

    _stopPolling = await connectAndPoll({
      number,
      password: pwd,
      onQR(dataUrl) {
        document.getElementById('qr-wrap').innerHTML = `<img src="${dataUrl}" alt="QR" />`;
        document.getElementById('qr-status').textContent = 'El código se renueva cada 20 segundos';
      },
      onReady() {
        document.getElementById('qr-wrap').innerHTML = '<div class="success-icon">✅</div>';
        document.getElementById('qr-status').textContent = '';
        document.querySelector('#modal-qr h3').textContent = '¡Conectado!';
        setTimeout(() => { closeQRModal(); loadBots(); }, 2000);
      },
      onError(msg) {
        document.getElementById('qr-status').textContent = msg;
        document.getElementById('qr-wrap').innerHTML = '<div style="font-size:36px">⚠️</div>';
      },
    });
  }

  function closeQRModal() {
    if (_stopPolling) { _stopPolling(); _stopPolling = null; }
    closeModal('modal-qr');
    loadBots();
  }

  // --- Modal utils ---
  function openModal(id) { document.getElementById(id).classList.add('open'); }
  function closeModal(id) { document.getElementById(id).classList.remove('open'); }

  document.querySelectorAll('.overlay').forEach(o => {
    o.addEventListener('click', e => { if (e.target === o) closeModal(o.id); });
  });

  // --- Auto-login ---
  if (pwd) {
    fetch('/api/auth', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ password: pwd }),
    }).then(r => r.json()).then(res => {
      if (res.ok && res.role === 'admin') showApp();
      else { sessionStorage.removeItem('admin_pwd'); pwd = ''; }
    });
  }

  document.getElementById('pwd-input').addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
  setInterval(loadBots, 6000);
</script>
</body>
</html>
